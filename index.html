<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تطبيق إدارة العملاء</title>
<style>
  body{font-family:tahoma,arial,sans-serif;direction:rtl}
  .pbtn{margin:0 2px;padding:2px 6px}
  .ac{background:#4caf50;color:white}
  .di{margin:4px 0;display:flex;justify-content:space-between}
  .dk{font-weight:600}
  .dv.money{color:green}.dv.rej{color:red}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .sec{margin-top:12px;font-weight:700;color:#333}
  .notebox{border:1px solid #ccc;padding:6px;margin-top:6px}
  .ust{padding:6px;margin:6px 0;display:inline-block}
  .ust-load{background:#f0f0f0;color:#555}
  .ust-ok{background:#4caf50;color:white}
  .ust-err{background:#f44336;color:white}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#333;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  #modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;overflow:auto;padding:20px}
  #modal.on{display:block}
  #sind{position:fixed;bottom:10px;right:10px;padding:6px 10px;background:#fff;border:1px solid #ccc;border-radius:4px;display:none}
</style>
</head>
<body>

<div id="loginWrap">
  <h3>تسجيل الدخول</h3>
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="doLogin()">دخول</button>
</div>

<div id="roleWrap" style="display:none">
  <h3>اختر الدور</h3>
  <input placeholder="كود" id="code"><br><br>
  <input type="password" placeholder="كلمة المرور" id="rolePassword"><br><br>
  <button onclick="doRoleLogin()">دخول</button>
  <button onclick="backToMain()">عودة</button>
</div>

<div id="app" style="display:none">
  <h2>جدول العملاء</h2>
  <div id="pag"></div>
  <div id="tbl"></div>
  <button onclick="doExport()">تصدير CSV</button>
</div>

<div id="modal"></div>
<div id="sind"></div>
<div id="uzone" style="border:1px dashed #999;padding:20px;text-align:center">اسحب الملف هنا</div>
<input type="file" id="ufile" onchange="onFileIn(event)" style="display:none">
<pre id="importLog" style="display:none"></pre>
<div id="fvHistory"></div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<script>
// ========================= GLOBAL =========================
let DB=[], FILES=[], FILTERED=[], PAGE=1, PER=10, ACTIVE_UID=null, FIREBASE_MODE=false;
const DB_KEY='DB_LOCAL', FI_KEY='FILES_LOCAL';

// Escape HTML
function esc(s){return s.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);}

// ========================= TABLE PAGINATION =========================
function renderPag(){
  const tp=Math.ceil(FILTERED.length/PER);
  const pg=document.getElementById('pag');
  if(tp<=1){pg.innerHTML='';return;}
  let h=`<button class="pbtn" onclick="goP(${PAGE-1})" ${PAGE===1?'disabled':''}>→</button>`;
  for(let i=1;i<=tp;i++){
    if(tp>9&&!(i===1||i===tp||Math.abs(i-PAGE)<=1)){
      if(i===2||i===tp-1)h+=`<span style="padding:0 4px;color:var(--t3)">…</span>`;continue;
    }
    h+=`<button class="pbtn ${i===PAGE?'ac':''}" onclick="goP(${i})">${i}</button>`;
  }
  h+=`<button class="pbtn" onclick="goP(${PAGE+1})" ${PAGE===tp?'disabled':''}>←</button>`;
  pg.innerHTML=h;
}

function goP(p){
  const tp=Math.ceil(FILTERED.length/PER);
  if(p<1||p>tp)return;
  PAGE=p;renderTbl();
  window.scrollTo({top:240,behavior:'smooth'});
}

function renderTbl(){
  const tbl=document.getElementById('tbl');
  if(!tbl)return;
  const start=(PAGE-1)*PER, end=PAGE*PER;
  const rows=FILTERED.slice(start,end);
  if(!rows.length){tbl.innerHTML='<p>لا توجد بيانات</p>';return;}
  tbl.innerHTML=rows.map(r=>`<div style="border-bottom:1px solid #ccc;padding:4px;cursor:pointer" onclick="openRec('${r._uid}')">
    ${esc(r['اسم_عميل']||'—')} | ${esc(r['الفرع']||'—')} | ${esc(r['تاريخ_زيارة']||'—')}
  </div>`).join('');
}

// ========================= MODAL =========================
function openRec(uid){ACTIVE_UID=uid;renderMod(uid);document.getElementById('modal').classList.add('on');}

function renderMod(uid){
  const r=DB.find(x=>x._uid===String(uid));
  if(!r)return;
  document.getElementById('modal').innerHTML='';
  const di=(lbl,v,cls='')=>(!v||v==='-')?'':`<div class="di ${cls}"><div class="dk">${lbl}</div><div class="dv ${cls}">${esc(String(v))}</div></div>`;
  const diM=(lbl,vKey,durKey)=>{
    const v=r[vKey];if(!v||v==='-')return '';
    const isRej=v==='مرفوض';
    const dur=r[durKey]&&r[durKey]!=='-'?` <small style="color:var(--t3);font-size:10px">(${r[durKey]} شهر)</small>`:'';
    return `<div class="di"><div class="dk">${lbl}</div><div class="dv ${isRej?'rej':'money'}">${esc(v)}${dur}</div></div>`;
  };
  const g1=`
    ${di('الفرع','الفرع')} ${di('تاريخ الزيارة','تاريخ_زيارة')} ${di('الشهر','الشهر')}
    <div class="di s2"><div class="dk">اسم العميل</div><div class="dv">${esc(r['اسم_عميل']||'—')}</div></div>
    <div class="di"><div class="dk">كود العميل</div><div class="dv code">${esc(r['كود_عميل']||'—')}</div></div>
    ${di('نوع المشروع','نوع_مشروع')} ${di('حالة العميل','حاله_عميل')} ${di('الدورة','دوره')}
    <div class="di s2"><div class="dk">عنوان العميل</div><div class="dv">${esc(r['عنوان_عميل']||'—')}</div></div>
    ${di('حالة الإصدار','حاله_اصدار')}`;
  const g2=`
    ${diM('رأي مدير الفرع','راي_فرع','مده_فرع')}
    ${diM('رأي المدير المركزي','راي_مركزي','مده_مركزي')}
    ${diM('رأي إدارة المخاطر','راي_مخاطر','مده_مخاطر')}
    ${diM('قرار الائتمان','قرار_ائتمان','مده_قرار')}`;
  const notes=r['ملاحظات']&&r['ملاحظات']!=='-'?`<div class="notebox"><div class="nk">📝 الملاحظات</div><div class="nv">${esc(r['ملاحظات'])}</div></div>`:'';
  document.getElementById('modal').innerHTML=`
    <div class="sec">👤 بيانات العميل</div><div class="dgrid">${g1}</div>
    <div class="sec">💰 قرارات التمويل</div><div class="dgrid">${g2}</div>
    ${notes}
    <div class="sec">📄 تقرير الزيارة</div>
    <div id="repSec">${buildRepSec(r)}</div>
    <button onclick="closeMod()">إغلاق</button>`;
}

function buildRepSec(r){
  if(r._report&&r._report.trim()){
    return `<div class="rs-box">
      <div class="rs-hdr">
        <div class="rs-hl"><span style="font-size:18px">📋</span><div><h4>تقرير الزيارة</h4>${r._reportDate?`<div class="rs-dt">${r._reportDate}</div>`:''}</div></div>
        <div class="rs-acts">
          <button onclick="editRep('${r._uid}')">✏️ تعديل</button>
          <button onclick="delRep('${r._uid}')">🗑️ حذف</button>
        </div>
      </div>
      <div class="rs-txt">${esc(r._report)}</div>
    </div>`;
  }
  return `<div class="no-rep"><p>لا يوجد تقرير زيارة لهذا العميل</p>
    <button onclick="addRep('${r._uid}')">✚ إضافة تقرير</button></div>`;
}

function showRepEd(uid,existing){
  document.getElementById('repSec').innerHTML=`
    <div class="re-wrap">
      <p class="re-lbl">✍️ ${existing?'تعديل':'كتابة'} تقرير الزيارة:</p>
      <textarea id="repTa" style="width:100%;height:80px">${existing||''}</textarea>
      <div>
        <button onclick="cancelRep('${uid}')">إلغاء</button>
        <button onclick="saveRep('${uid}')">💾 حفظ التقرير</button>
      </div>
    </div>`;
  setTimeout(()=>{const ta=document.getElementById('repTa');if(ta)ta.focus();},50);
}

function addRep(uid){showRepEd(uid,'');}
function editRep(uid){const r=DB.find(x=>x._uid===String(uid));if(r)showRepEd(uid,r._report||'');}
async function saveRep(uid){
  const txt=(document.getElementById('repTa').value||'').trim();
  const r=DB.find(x=>x._uid===String(uid));
  if(!r)return;
  const updated={...r,_report:txt,_reportDate:new Date().toLocaleDateString('ar-EG')};
  showSave('saving'); await writeRecord(updated); showSave('ok');
  upsertLocal(updated); renderMod(uid); renderTbl(); updateStats();
}
async function delRep(uid){if(!confirm('حذف تقرير الزيارة لهذا العميل؟'))return;
  const r=DB.find(x=>x._uid===String(uid)); if(!r)return;
  const updated={...r,_report:'',_reportDate:''};
  showSave('saving'); await writeRecord(updated); showSave('ok');
  upsertLocal(updated); renderMod(uid); renderTbl(); updateStats();
}
function cancelRep(uid){renderMod(uid);}
function closeMod(){document.getElementById('modal').classList.remove('on');ACTIVE_UID=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMod();});

// ========================= CSV =========================
function doExport(){
  const cols=['الفرع','تاريخ_زيارة','اسم_عميل','نوع_مشروع','حاله_عميل','كود_عميل','دوره','عنوان_عميل','راي_فرع','مده_فرع','راي_مركزي','مده_مركزي','راي_مخاطر','مده_مخاطر','ملاحظات','قرار_ائتمان','مده_قرار','حاله_اصدار','الشهر','تقرير_الزيارة'];
  const hdrs=['الفرع','تاريخ الزيارة','اسم العميل','نوع المشروع','حالة العميل','كود العميل','الدورة','عنوان العميل','رأي الفرع','المدة (فرع)','رأي المركزي','المدة (مركزي)','رأي المخاطر','المدة (مخاطر)','ملاحظات','قرار الائتمان','المدة (قرار)','حالة الإصدار','الشهر','تقرير الزيارة'];
  const rows=FILTERED.map(r=>cols.map(c=>{
    const v=c==='تقرير_الزيارة'?(r._report||''):(r[c]||'');
    return `"${String(v).replace(/"/g,'""')}"`;
  }).join(','));
  const csv='\uFEFF'+[hdrs.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`تقرير_المخاطر_${new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')}.csv`;
  a.click();
}

// ========================= LOGIN =========================
function doLogin(){
  const password=document.getElementById("password").value.trim();
  if(password==="Fadicash@2026"){document.getElementById("loginWrap").style.display="none";document.getElementById("roleWrap").style.display="block";}
  else alert("كلمة المرور غير صحيحة");
}
function doRoleLogin(){
  const code=document.getElementById("code").value.trim();
  const pass=document.getElementById("rolePassword").value.trim();
  if(code==="100100"&&pass==="fadicash@2026"){alert("دخول مسؤول ميداني"); showFieldPage();}
  else if(code==="1002406"&&pass==="Fadicash@2026"){alert("دخول المدير"); document.getElementById("roleWrap").style.display="none"; document.getElementById("app").style.display="block"; initApp && initApp();}
  else alert("بيانات غير صحيحة");
}
function backToMain(){document.getElementById("roleWrap").style.display="none";document.getElementById("loginWrap").style.display="block";}

function showFieldPage(){
  document.getElementById("roleWrap").style.display="none";
  if(document.getElementById("app")) document.getElementById("app").style.display="none";
  let fieldPage=document.getElementById("fieldPage");
  if(!fieldPage){fieldPage=document.createElement("div"); fieldPage.id="fieldPage";
    fieldPage.innerHTML=`<h2>الزيارات الميدانية</h2>
      <input id="fv_client" placeholder="اسم العميل"><br><br>
      <input id="fv_officer" placeholder="اسم القائم بالزيارة"><br><br>
      <input id="fv_branch" placeholder="اسم الفرع"><br><br>
      <input id="fv_date" placeholder="التاريخ"><br><br>
      <input id="fv_gps" placeholder="الموقع" readonly>
      <button id="gpsBtn" onclick="getGPS()">📍 تحديد الموقع</button><br><br>
      <button id="fvSubmitBtn" onclick="submitFieldVisit()">✅ حفظ الزيارة</button>
      <div id="fvMsg"></div>`;
    document.body.appendChild(fieldPage);
  }
  fieldPage.style.display="block";
}

// ========================= GPS & VISITS =========================
function getGPS(){
  const btn=document.getElementById('gpsBtn'); const inp=document.getElementById('fv_gps');
  if(!navigator.geolocation){if(inp)inp.value='الجهاز لا يدعم GPS';return;}
  if(btn){btn.textContent='⏳ جاري التحديد...'; btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
    if(inp) inp.value=`${lat}, ${lng}`; if(btn){btn.textContent='✅ تم التحديد'; btn.disabled=false;}
  }, err=>{
    if(inp) inp.value='تعذر تحديد الموقع'; if(btn){btn.textContent='📍 إعادة المحاولة'; btn.disabled=false;}
  }, {enableHighAccuracy:true, timeout:12000});
}

async function submitFieldVisit(){
  const client=document.getElementById('fv_client').value.trim();
  const officer=document.getElementById('fv_officer').value.trim();
  const branch=document.getElementById('fv_branch').value.trim();
  const date=document.getElementById('fv_date').value.trim();
  const gps=document.getElementById('fv_gps').value.trim();
  const msgEl=document.getElementById('fvMsg'); const btn=document.getElementById('fvSubmitBtn');
  if(msgEl) msgEl.className='fv-msg';
  if(!client||!officer||!branch){if(msgEl){msgEl.textContent='❌ يرجى ملء جميع الحقول'; msgEl.classList.add('on','fv-err');} return;}
  const record={_uid:`fv_${Date.now()}`,client,officer,branch,date,gps:gps||'غير محدد',timestamp:new Date().toISOString()};
  if(btn){btn.disabled=true; btn.textContent='⏳ جاري الحفظ...';}
  let saved=false;
  if(window.__sharedFbDb){
    try{ const { setDoc, doc, collection } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js'); await setDoc(doc(collection(window.__sharedFbDb,'fieldVisits'),record._uid),record); saved=true;}
    catch(e){console.error(e); saved=false;}
  } else {
    let arr=JSON.parse(localStorage.getItem('FIELD_VISITS')||'[]'); arr.push(record); localStorage.setItem('FIELD_VISITS',JSON.stringify(arr)); saved=true;
  }
  if(saved){
    if(msgEl){msgEl.textContent='✅ تم حفظ الزيارة بنجاح'; msgEl.className='fv-msg fv-ok';}
    if(btn){btn.disabled=false; btn.textContent='✅ حفظ الزيارة';}
    ['fv_client','fv_officer','fv_branch','fv_date','fv_gps'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    loadFvHistory();
  } else {if(msgEl){msgEl.textContent='❌ خطأ أثناء الحفظ'; msgEl.className='fv-msg fv-err';} if(btn){btn.disabled=false; btn.textContent='✅ حفظ الزيارة';}}
}

function loadFvHistory(){
  const div=document.getElementById('fvHistory'); if(!div) return;
  let arr=JSON.parse(localStorage.getItem('FIELD_VISITS')||'[]');
  div.innerHTML='<h4>آخر 10 زيارات ميدانية</h4>';
  arr.slice(-10).reverse().forEach(r=>{div.innerHTML+=`<div>${esc(r.client)} | ${esc(r.branch)} | ${esc(r.date||'—')} | ${esc(r.gps)}</div>`;});
}

// ========================= UTIL =========================
function showSave(st){
  const el=document.getElementById('sind'); if(!el)return;
  el.style.display='block';
  if(st==='saving'){el.textContent='⏳ جاري الحفظ...';el.style.background='#fffae6';el.style.color='#555';}
  else if(st==='ok'){el.textContent='✅ تم الحفظ';el.style.background='#4caf50';el.style.color='#fff'; setTimeout(()=>{el.style.display='none';},1200);}
  else if(st==='err'){el.textContent='❌ خطأ أثناء الحفظ';el.style.background='#f44336';el.style.color='#fff'; setTimeout(()=>{el.style.display='none';},2000);}
}

// ========================= LOCAL STORAGE =========================
function upsertLocal(rec){
  const idx=DB.findIndex(x=>x._uid===rec._uid);
  if(idx>=0)DB[idx]=rec; else DB.push(rec);
  localStorage.setItem(DB_KEY,JSON.stringify(DB));
}

function writeRecord(rec){return new Promise(res=>{upsertLocal(rec);setTimeout(()=>res(true),200);});}
function updateStats(){FILTERED=DB.slice(); renderTbl(); renderPag();}

// ========================= IMPORT FILE =========================
function onFileIn(e){const f=(e.target.files||[])[0]; if(f) procFile(f);}
function onDrop(e){e.preventDefault(); const f=(e.dataTransfer.files||[])[0]; if(f) procFile(f);}
function procFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    const wb=XLSX.read(data,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{defval:'-'});
    let added=0, skipped=0;
    json.forEach(row=>{
      if(!row['كود_عميل']){skipped++; return;}
      row._uid=row['كود_عميل']; if(DB.find(x=>x._uid===row._uid)){skipped++; return;}
      DB.push(row); added++;
    });
    localStorage.setItem(DB_KEY,JSON.stringify(DB));
    alert(`تم إضافة ${added} سجل، تخطي ${skipped} سجل`);
    updateStats();
  };
  reader.readAsBinaryString(file);
}
['uzone'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('dragover',e=>e.preventDefault());
  el.addEventListener('drop',onDrop);
});

</script>

</body>
</html>
